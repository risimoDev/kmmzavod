events {
  worker_processes auto;
}

http {
  client_max_body_size 500M;  # allow large asset uploads

  upstream api {
    server api:3000;
    keepalive 32;
  }

  upstream admin {
    server admin:3000;
  }

  server {
    listen 80;
    server_name _;

    location /api/ {
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      # SSE support
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 300s;
    }

    location /admin/ {
      proxy_pass http://admin/;
      proxy_set_header Host $host;
    }

    location / {
      proxy_pass http://api;
      proxy_set_header Host $host;
    }
  }
}
