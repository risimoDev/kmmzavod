events {
  worker_connections 1024;
}

http {
  client_max_body_size 500M;

  # ── Gzip ──────────────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 4;
  gzip_min_length 256;
  gzip_types
    text/plain text/css text/javascript
    application/json application/javascript application/xml
    image/svg+xml;

  # Docker embedded DNS — резолвим хосты per-request, а не при старте nginx
  resolver 127.0.0.11 valid=10s ipv6=off;

  # ── HTTP: ACME-challenge + редирект на HTTPS ───────────────────────────────
  server {
    listen 80;
    server_name k-m-m.ru www.k-m-m.ru _;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://k-m-m.ru$request_uri;
    }
  }

  # ── HTTPS ─────────────────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    http2 on;
    server_name k-m-m.ru www.k-m-m.ru;

    ssl_certificate     /etc/letsencrypt/live/k-m-m.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/k-m-m.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    # ssl_stapling off — Let's Encrypt certs don't include OCSP responder URL
    # ssl_stapling on;
    # ssl_stapling_verify on;

    # ── Security headers ──────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /api/ {
      set $upstream_api http://api:3000;
      proxy_pass $upstream_api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # SSE support
      proxy_buffering off;
      proxy_cache off;
      chunked_transfer_encoding on;
      proxy_read_timeout 3600s;
    }

    # MinIO public storage proxy — serves bucket objects without signatures
    location /storage/ {
      set $upstream_minio http://minio:9000;
      rewrite ^/storage/(.*)$ /$1 break;
      proxy_pass $upstream_minio;
      proxy_http_version 1.1;
      proxy_set_header Host minio:9000;
      proxy_set_header Connection "";
      proxy_hide_header x-amz-request-id;
      proxy_hide_header x-amz-id-2;
      proxy_hide_header x-amz-meta-server-side-encryption;
      proxy_hide_header x-amz-server-side-encryption;
      # Cache static assets at browser level
      add_header Cache-Control "public, max-age=86400, immutable";
      add_header X-Content-Type-Options "nosniff" always;
    }

    location /_next/webpack-hmr {
      set $upstream_web http://web:3001;
      proxy_pass $upstream_web;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }

    location / {
      set $upstream_web http://web:3001;
      proxy_pass $upstream_web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
