version: "3.9"

services:
  # ─── Dev-only: postgres with exposed port ──────────────────────────────────
  postgres-dev:
    extends:
      service: postgres
    ports:
      - "5433:5432"
    profiles:
      - dev

  # ─── Dev-only: redis with exposed port ─────────────────────────────────────
  redis-dev:
    extends:
      service: redis
    ports:
      - "6379:6379"
    profiles:
      - dev

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: kmmzavod
      POSTGRES_USER: kmmzavod
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kmmzavod"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://kmmzavod:${POSTGRES_PASSWORD}@postgres:5432/kmmzavod
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  orchestrator:
    build:
      context: .
      dockerfile: apps/orchestrator/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://kmmzavod:${POSTGRES_PASSWORD}@postgres:5432/kmmzavod
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      HEYGEN_API_KEY: ${HEYGEN_API_KEY}
      KLING_ACCESS_KEY: ${KLING_ACCESS_KEY}
      KLING_SECRET_KEY: ${KLING_SECRET_KEY}
      IMAGE_GEN_API_KEY: ${IMAGE_GEN_API_KEY}
      IMAGE_GEN_PROVIDER: ${IMAGE_GEN_PROVIDER:-fal}
      VIDEO_PROCESSOR_URL: http://video-processor:8000
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 2g
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  video-processor:
    build:
      context: apps/video-processor
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_SECURE: "false"
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      WORKERS: 2
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 2g
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${JWT_SECRET}
    networks:
      - frontend
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - frontend
      - backend
    depends_on:
      - api
      - web

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  backend:
    driver: bridge
    internal: true
  frontend:
    driver: bridge
