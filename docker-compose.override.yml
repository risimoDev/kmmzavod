# Dev overrides — only infrastructure runs in Docker.
# App services (api, orchestrator, web, video-processor, nginx) are disabled
# because they run locally via `pnpm dev`.
# This file is auto-loaded by `docker compose up` on dev machines.
# Do NOT deploy this to production.

services:
  postgres:
    ports:
      - "5433:5432"
    networks:
      - backend
      - frontend

  redis:
    ports:
      - "6379:6379"
    networks:
      - backend
      - frontend

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

  # ── Disable app services for local dev ─────────────────────────────────
  api:
    profiles: ["server"]

  orchestrator:
    profiles: ["server"]

  video-processor:
    profiles: ["server"]

  web:
    profiles: ["server"]

  nginx:
    profiles: ["server"]
